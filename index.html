<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ariella's Records</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #1c1c1c;
      --surface3: #242424;
      --text: #ede0cf;
      --muted: #7a6e62;
      --accent: #c9a96e;
      --accent2: #a07840;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ─────────────────────────────── */
    header {
      padding: 2.2rem 3.5rem 2rem;
      display: flex;
      align-items: baseline;
      gap: 1.2rem;
      border-bottom: 1px solid #1c1c1c;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    header .sub {
      font-size: 0.82rem;
      color: var(--muted);
      font-style: italic;
      letter-spacing: 0.04em;
    }
    .preview-note {
      margin-left: auto;
      font-size: 0.72rem;
      color: var(--muted);
      align-self: center;
      font-style: italic;
    }

    /* ── PLAYER SECTION ─────────────────────── */
    .player-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4rem;
      padding: 3.5rem 3.5rem 3rem;
    }

    /* ── TURNTABLE ──────────────────────────── */
    .turntable {
      flex-shrink: 0;
      position: relative;
      width: 480px;
      height: 460px;
      background:
        linear-gradient(170deg,
          #3d1f0a 0%,
          #5c2e0e 18%,
          #3a1a08 36%,
          #6b3510 52%,
          #3e1e09 68%,
          #512610 82%,
          #2e1508 100%
        );
      border-radius: 14px;
      box-shadow:
        0 0 0 1px #8b4a1a,
        0 0 0 2px #2a1006,
        inset 0 1px 0 rgba(255,200,100,0.12),
        inset 0 -1px 0 rgba(0,0,0,0.4),
        0 30px 90px rgba(0,0,0,0.95),
        0 8px 24px rgba(0,0,0,0.6);
    }

    /* Wood grain lines */
    .turntable::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background:
        repeating-linear-gradient(
          172deg,
          transparent 0px,       transparent 9px,
          rgba(0,0,0,0.18)       9px,        rgba(0,0,0,0.18) 10px,
          transparent            10px,       transparent 18px,
          rgba(255,160,60,0.06)  18px,       rgba(255,160,60,0.06) 19px,
          transparent            19px,       transparent 28px,
          rgba(0,0,0,0.12)       28px,       rgba(0,0,0,0.12) 29px,
          transparent            29px,       transparent 40px,
          rgba(255,140,40,0.04)  40px,       rgba(255,140,40,0.04) 41px
        );
      pointer-events: none;
    }

    /* Gloss coat */
    .turntable::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background:
        linear-gradient(160deg,
          rgba(255,220,160,0.07) 0%,
          transparent 40%,
          rgba(0,0,0,0.15) 100%
        );
      pointer-events: none;
    }

    /* Now-playing info */
    .np-label {
      position: absolute;
      top: 22px;
      left: 24px;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(255,210,160,0.55);
    }
    .np-title {
      position: absolute;
      top: 36px;
      left: 24px;
      right: 130px;
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      color: #f5e8d0;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Platter */
    .platter {
      position: absolute;
      left: 106px;
      top: 72px;
      width: 268px;
      height: 268px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #303030 0%, #222 40%, #151515 70%, #0d0d0d 100%);
      box-shadow:
        0 6px 28px rgba(0,0,0,0.85),
        inset 0 0 40px rgba(0,0,0,0.6),
        0 0 0 2px #1a1a1a;
    }
    .platter-mat {
      position: absolute;
      inset: 7px;
      border-radius: 50%;
      background: radial-gradient(circle, #2a2a2a 0%, #1a1a1a 100%);
    }

    /* Vinyl on platter */
    .vinyl-on-platter {
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, var(--lc,#b8965a) 0%, var(--lc,#b8965a) 27%, transparent 27.5%),
        repeating-radial-gradient(circle at 50% 50%, #0d0d0d 0px, #1c1c1c 1.2px, #0d0d0d 2.4px);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .vinyl-on-platter.visible { opacity: 1; }
    .vinyl-on-platter.spinning {
      animation: spin 2.8s linear infinite;
      animation-play-state: paused;
    }
    .vinyl-on-platter.spinning.playing {
      animation-play-state: running;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .vinyl-hole {
      position: absolute;
      width: 8px; height: 8px;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      border-radius: 50%;
      background: #080808;
      z-index: 2;
    }
    /* Off-center dot so rotation is visually apparent */
    .vinyl-marker {
      position: absolute;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
    }

    /* Spindle */
    .spindle {
      position: absolute;
      width: 10px; height: 10px;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ccc, #666);
      z-index: 3;
      box-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    /* Tonearm */
    .tonearm-pivot {
      position: absolute;
      right: 52px;
      top: 62px;
      width: 26px; height: 26px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #bbb, #555);
      box-shadow: 0 3px 10px rgba(0,0,0,0.7);
      z-index: 10;
    }
    .tonearm-arm {
      position: absolute;
      right: 64px;  /* center of pivot */
      top: 74px;    /* center of pivot */
      width: 210px;
      height: 7px;
      transform-origin: right center;
      transform: rotate(-36deg);
      transition: transform 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      background: linear-gradient(to left, #999 0%, #777 30%, #555 70%, #444 100%);
      border-radius: 3px 1px 1px 3px;
      z-index: 9;
    }
    .tonearm-arm.playing { transform: rotate(2deg); }
    .tonearm-arm.parked  { transform: rotate(2deg); transition: none; }
    .tonearm-arm::before {
      /* headshell */
      content: '';
      position: absolute;
      left: -4px; top: -8px;
      width: 14px; height: 22px;
      background: linear-gradient(to bottom, #666, #3a3a3a);
      border-radius: 2px 2px 5px 5px;
      transform: rotate(10deg);
      transform-origin: top center;
    }
    .tonearm-arm::after {
      /* needle */
      content: '';
      position: absolute;
      left: 3px; bottom: -10px;
      width: 1.5px; height: 11px;
      background: #bbb;
      transform: rotate(-5deg);
    }
    .tonearm-cw {
      /* counterweight */
      position: absolute;
      right: -22px; top: -9px;
      width: 22px; height: 22px;
      border-radius: 3px;
      background: radial-gradient(circle at 35% 35%, #aaa, #3a3a3a);
      box-shadow: 0 2px 6px rgba(0,0,0,0.6);
      z-index: 11;
    }

    /* Progress bar */
    .progress-wrap {
      position: absolute;
      bottom: 80px; left: 24px; right: 24px;
      height: 2px;
      background: rgba(255,200,140,0.2);
      border-radius: 1px;
      cursor: pointer;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 1px;
      transition: width 0.1s linear;
    }
    .progress-wrap:hover .progress-fill { background: var(--accent2); }

    /* Time display */
    .time-display {
      position: absolute;
      bottom: 87px;
      right: 24px;
      font-size: 10px;
      color: rgba(255,210,160,0.6);
      letter-spacing: 0.05em;
    }

    /* Controls */
    .controls {
      position: absolute;
      bottom: 18px; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .ctrl {
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,200,140,0.3);
      color: rgba(255,210,160,0.7);
      border-radius: 50%;
      width: 36px; height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, transform 0.15s, background 0.2s;
      flex-shrink: 0;
    }
    .ctrl:hover { border-color: #e8c070; color: #e8c070; transform: scale(1.05); background: rgba(0,0,0,0.35); }
    .ctrl:active { transform: scale(0.95); }
    .ctrl.primary {
      width: 46px; height: 46px;
      border-color: #e8c070;
      color: #e8c070;
      background: rgba(0,0,0,0.3);
    }
    .ctrl.primary:hover { background: rgba(0,0,0,0.45); }
    .ctrl.stop:hover { border-color: #e07070; color: #e07070; }

    /* Volume */
    .volume-wrap {
      position: absolute;
      right: 20px; bottom: 27px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .volume-wrap svg { color: rgba(255,210,160,0.6); flex-shrink: 0; }
    input[type=range].vol {
      -webkit-appearance: none;
      width: 56px; height: 2px;
      background: rgba(255,200,140,0.2);
      border-radius: 1px;
      outline: none;
    }
    input[type=range].vol::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    /* ── TRACKLIST ───────────────────────────── */
    .tracklist-panel {
      width: 340px;
      min-height: 460px;
      position: relative;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .tl-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: absolute;
      inset: 0;
      gap: 0.75rem;
      color: var(--muted);
      font-style: italic;
      font-size: 0.8rem;
      text-align: center;
      padding: 2rem;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .tl-empty.visible { opacity: 1; }
    .tl-empty-disc {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: repeating-radial-gradient(circle, #2a2a2a 0px, #2a2a2a 3px, #1a1a1a 3px, #1a1a1a 6px);
      border: 1px solid #2a2a2a;
      position: relative;
    }
    .tl-empty-disc::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--bg);
      border: 1px solid #333;
    }
    .tracklist-panel .tl-header,
    .tracklist-panel .track-list,
    .tracklist-panel .tl-open {
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }
    .tracklist-panel.visible .tl-header,
    .tracklist-panel.visible .track-list,
    .tracklist-panel.visible .tl-open {
      opacity: 1;
      pointer-events: all;
    }
    .tracklist-panel.visible .tl-empty { opacity: 0; pointer-events: none; }
    .tl-art {
      width: 60px; height: 60px;
      border-radius: 3px;
      object-fit: cover;
      background: var(--surface2);
      flex-shrink: 0;
    }
    .tl-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 1.2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #1e1e1e;
    }
    .tl-header-text {}
    .tl-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .tl-header p {
      font-size: 0.76rem;
      color: var(--muted);
      margin-top: 3px;
    }
    .tl-meta {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 4px;
      opacity: 0.7;
    }
    .track-list {
      list-style: none;
      max-height: 310px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .track-list::-webkit-scrollbar { width: 3px; }
    .track-list::-webkit-scrollbar-track { background: transparent; }
    .track-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
    .track-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .track-item:hover { background: var(--surface2); }
    .track-item.active { background: var(--surface2); }
    .track-item.active .track-num,
    .track-item.active .track-name { color: var(--accent); }
    .track-num { width: 22px; text-align: right; font-size: 0.72rem; color: var(--muted); flex-shrink: 0; }
    .track-name { flex: 1; font-size: 0.83rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .track-dur { font-size: 0.7rem; color: var(--muted); flex-shrink: 0; }
    .tl-open {
      display: block;
      margin-top: 1rem;
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: none;
      text-align: center;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    .tl-open:hover { color: var(--accent); }

    /* ── ALBUM GRID ─────────────────────────── */
    .grid-section {
      padding: 2.5rem 3.5rem 5rem;
      border-top: 1px solid #161616;
    }
    .grid-section > h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 400;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 1.8rem;
      letter-spacing: 0.02em;
    }
    .album-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 2rem 1.6rem;
    }

    .album-card {
      position: relative;
      cursor: pointer;
      transform-origin: center bottom;
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .album-card:hover {
      transform: rotate(3deg) translateY(-5px);
      z-index: 20;
    }
    .album-card.active {
      transform: scale(0.96);
    }

    /* Vinyl peeking from behind the sleeve */
    .sleeve-wrap {
      position: relative;
    }
    .vinyl-peek {
      position: absolute;
      width: 90%;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, var(--lc, #b8965a) 0%, var(--lc, #b8965a) 27%, transparent 27.5%),
        repeating-radial-gradient(circle at 50% 50%, #0d0d0d 0px, #1c1c1c 1.2px, #0d0d0d 2.4px);
      right: -22%;
      top: 5%;
      z-index: 0;
      opacity: 0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.7);
      transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
    }
    .album-card:hover .vinyl-peek {
      right: -36%;
      opacity: 1;
    }
    .album-cover-wrap {
      position: relative;
      z-index: 1;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 2px;
      background: var(--surface2);
      box-shadow: 0 6px 20px rgba(0,0,0,0.6);
    }
    .album-art {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .album-art.loaded { opacity: 1; }
    .art-shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
      animation: shimmer 1.8s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%,100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }
    .art-shimmer.hidden { display: none; }

    /* Active ring on card */
    .album-card.active .album-cover-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 2px solid var(--accent);
      border-radius: 2px;
      pointer-events: none;
    }

    .album-info { margin-top: 9px; }
    .album-title {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.3;
    }
    .album-artist {
      font-size: 0.7rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 2px;
    }

    /* Tooltip */
    .album-tooltip {
      position: absolute;
      bottom: calc(100% + 14px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(12, 10, 8, 0.97);
      border: 1px solid #282420;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.74rem;
      color: var(--text);
      white-space: normal;
      width: 200px;
      text-align: center;
      line-height: 1.55;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 100;
      box-shadow: 0 12px 32px rgba(0,0,0,0.8);
    }
    .album-tooltip::after {
      content: '';
      position: absolute;
      top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #282420;
    }
    .album-card:hover .album-tooltip { opacity: 1; }

    /* ── FLYING VINYL ────────────────────────── */
    .flying-vinyl {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      display: none;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8);
      transition: left 0.85s cubic-bezier(0.4, 0, 0.2, 1),
                  top 0.85s cubic-bezier(0.4, 0, 0.2, 1),
                  width 0.85s cubic-bezier(0.4, 0, 0.2, 1),
                  height 0.85s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.3s;
    }


    /* Responsive */
    @media (max-width: 1200px) {
      .album-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 960px) {
      .player-section { flex-direction: column; gap: 2rem; }
      .album-grid { grid-template-columns: repeat(3, 1fr); }
      .turntable { width: 380px; height: 380px; }
      .platter { width: 210px; height: 210px; left: 85px; top: 58px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Ariella's Records</h1>
  <span class="sub">a digitized version of my favorite albums</span>
</header>

<section class="player-section">
  <!-- ── Turntable ── -->
  <div class="turntable" id="turntable">
    <div class="np-label" id="npLabel">select an album</div>
    <div class="np-title" id="npTitle">—</div>

    <div class="platter" id="platter">
      <div class="platter-mat"></div>
      <div class="vinyl-on-platter" id="vinylOnPlatter">
        <div class="vinyl-marker"></div>
        <div class="vinyl-hole"></div>
      </div>
      <div class="spindle"></div>
    </div>

    <!-- Tonearm -->
    <div class="tonearm-pivot">
      <div class="tonearm-arm" id="tonearm">
        <div class="tonearm-cw"></div>
      </div>
    </div>



    <!-- Progress bar -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="time-display" id="timeDisplay"></div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl" id="prevBtn" title="Previous track">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl primary" id="playPauseBtn" title="Play / Pause">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" id="ppIcon"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl" id="nextBtn" title="Next track">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM14 6v12h2V6z"/></svg>
      </button>
      <button class="ctrl stop" id="stopBtn" title="Stop & return">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
      </button>

// ── Fetch album art + collectionId from iTunes ──────────────────────────────
async function fetchAlbumMeta(idx) {
  const a = ALBUMS[idx];
  if (a.staticMeta) return a.staticMeta;
  try {
    let res;
    if (a.itunesId) {
      const r = await fetch(`https://itunes.apple.com/lookup?id=${a.itunesId}&country=us`);
      const d = await r.json();
      res = d.results?.find(r => r.collectionId == a.itunesId) || d.results?.[0];
    } else {
      const q = encodeURIComponent(a.itunesQuery || `${a.artist} ${a.title}`);
      const r = await fetch(`https://itunes.apple.com/search?term=${q}&entity=album&limit=1&media=music`);
      const d = await r.json();
      res = d.results?.[0];
    }
    if (res) {
      const baseArt = (res.artworkUrl100 || res.artworkUrl60 || '').replace(/\d+x\d+bb/, '600x600bb');
      const smallArt = (res.artworkUrl100 || res.artworkUrl60 || '').replace(/\d+x\d+bb/, '200x200bb');
      return {
        artUrl: baseArt,
        artSmall: smallArt,
        collectionId: res.collectionId || a.itunesId,
        artistName: res.artistName,
        collectionName: res.collectionName,
        year: res.releaseDate ? new Date(res.releaseDate).getFullYear() : null,
      };
    }
  } catch {}
  return null;
}

// ── Fetch tracklist ──────────────────────────────────────────────────────────
async function fetchTracks(collectionId) {
  try {
    const r = await fetch(`https://itunes.apple.com/lookup?id=${collectionId}&entity=song&country=us`);
    const d = await r.json();
    return (d.results || [])
      .filter(t => t.wrapperType === 'track' || (t.kind === 'song' && t.trackName))
      .sort((a, b) => (a.discNumber - b.discNumber) || (a.trackNumber - b.trackNumber));
  } catch {}
  return [];
}

// ── Vinyl CSS background ─────────────────────────────────────────────────────
function vinylBg(labelColor) {
  return `
    radial-gradient(circle at center, ${labelColor} 0%, ${labelColor} 27%, transparent 27.5%),
    repeating-radial-gradient(circle at 50% 50%, #0d0d0d 0px, #1c1c1c 1.2px, #0d0d0d 2.4px)
  `;
}

// ── Build album grid ─────────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('albumGrid');
  ALBUMS.forEach((a, i) => {
    const card = document.createElement('div');
    card.className = 'album-card';
    card.dataset.i = i;
    card.innerHTML = `
      <div class="sleeve-wrap">
        <div class="vinyl-peek" style="--lc:${a.labelColor}"></div>
        <div class="album-cover-wrap">
          <div class="art-shimmer" id="shim-${i}"></div>
          <img class="album-art" id="art-${i}" alt="${a.title}" />
        </div>
      </div>
      <div class="album-info">
        <div class="album-title">${a.title}</div>
        <div class="album-artist">${a.artist}</div>
      </div>
      <div class="album-tooltip">${a.note}</div>
    `;
    card.addEventListener('click', () => selectAlbum(i));
    grid.appendChild(card);

    // Load art asynchronously
    fetchAlbumMeta(i).then(meta => {
      if (!meta) return;
      albumMeta[i] = meta;
      const img = document.getElementById(`art-${i}`);
      const shim = document.getElementById(`shim-${i}`);
      img.src = meta.artUrl;
      img.onload = () => { img.classList.add('loaded'); shim.classList.add('hidden'); };
      img.onerror = () => { shim.classList.add('hidden'); };
    });
  });
}

// ── Select and play an album ─────────────────────────────────────────────────
async function selectAlbum(idx) {
  if (currentIdx === idx) return;

  // Reset previous active card
  if (currentIdx !== null) {
    document.querySelector(`.album-card[data-i="${currentIdx}"]`).classList.remove('active');
  }

  currentIdx = idx;
  const album = ALBUMS[idx];
  const card = document.querySelector(`.album-card[data-i="${idx}"]`);
  card.classList.add('active');

  // Reset vinyl spin / tonearm while we animate
  vinylOnPlatter.classList.remove('spinning', 'playing');
  tonearm.classList.remove('playing', 'parked');

  // ── Flying vinyl animation ──
  await flyVinylToPlayer(card, album.labelColor);

  // ── Set vinyl color on platter ──
  vinylOnPlatter.style.background = vinylBg(album.labelColor);
  vinylOnPlatter.classList.add('visible');

  // ── Drop needle ──
  setTimeout(() => {
    tonearm.classList.add('playing');
    setTimeout(() => { vinylOnPlatter.classList.add('spinning', 'playing'); }, 600);
  }, 200);

  // ── Update labels ──
  npLabel.textContent = 'now playing';
  npTitle.textContent = `${album.artist} — ${album.title}`;

  // ── Tracklist panel ──
  tlTitle.textContent = album.title;
  tlArtist.textContent = album.artist;
  tlSpotify.href = `https://open.spotify.com/search/${album.spotifySearch}`;
  tracklistPanel.classList.add('visible');
  tlEmpty.classList.remove('visible');

  // Update small art in tracklist header if available
  if (albumMeta[idx]) {
    tlArt.src = albumMeta[idx].artSmall || albumMeta[idx].artUrl;
  } else {
    // Try loading meta if not yet loaded
    fetchAlbumMeta(idx).then(meta => {
      if (meta) { albumMeta[idx] = meta; tlArt.src = meta.artSmall; }
    });
  }

  // ── Fetch & play tracks ──
  tracks = [];
  trackIdx = 0;
  trackList.innerHTML = '<li style="padding:10px 10px;font-size:0.75rem;color:var(--muted);font-style:italic;">loading tracks…</li>';

  if (album.staticTracks) {
    tracks = album.staticTracks;
    trackIdx = 0;
    renderTrackList();
    if (tracks.length) playTrack(0);
    const year = album.staticMeta?.year;
    tlMeta.textContent = [year, `${tracks.length} tracks`].filter(Boolean).join(' · ');
  } else {
    const meta = albumMeta[idx] || await fetchAlbumMeta(idx);
    if (meta) {
      albumMeta[idx] = meta;
      const fetched = await fetchTracks(meta.collectionId);
      tracks = fetched;
      trackIdx = 0;
      renderTrackList();
      if (tracks.length) playTrack(0);
      tlMeta.textContent = [meta.year, `${tracks.length} tracks`].filter(Boolean).join(' · ');
    } else {
      trackList.innerHTML = '<li style="padding:10px;font-size:0.75rem;color:var(--muted);font-style:italic;">tracks unavailable</li>';
      tlMeta.textContent = '';
    }
  }
}

// ── Render tracklist ─────────────────────────────────────────────────────────
function renderTrackList() {
  trackList.innerHTML = '';
  tracks.forEach((t, i) => {
    const li = document.createElement('li');
    li.className = 'track-item' + (i === trackIdx ? ' active' : '');
    const ms = t.trackTimeMillis || 0;
    const m = Math.floor(ms / 60000);
    const s = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
    li.innerHTML = `
      <span class="track-num">${t.trackNumber}</span>
      <span class="track-name">${t.trackName}</span>
      <span class="track-dur">${ms ? `${m}:${s}` : '—'}</span>
    `;
    li.addEventListener('click', () => { trackIdx = i; playTrack(i); renderTrackList(); });
    trackList.appendChild(li);
  });
}

// ── Play a specific track ────────────────────────────────────────────────────
function playTrack(i) {
  const t = tracks[i];
  if (!t?.previewUrl) return;
  audio.src = t.previewUrl;
  audio.volume = parseFloat(volSlider.value);
  audio.play().then(() => {
    isPlaying = true;
    updatePP();
    vinylOnPlatter.classList.add('spinning', 'playing');
    tonearm.classList.add('playing');
  }).catch(() => {});
  document.querySelectorAll('.track-item').forEach((el, j) => el.classList.toggle('active', j === i));
}

// ── Flying vinyl ─────────────────────────────────────────────────────────────
function flyVinylToPlayer(card, labelColor) {
  return new Promise(resolve => {
    const cardRect  = card.getBoundingClientRect();
    const peekEl    = card.querySelector('.vinyl-peek');
    const peekRect  = peekEl ? peekEl.getBoundingClientRect() : cardRect;
    const platter   = document.getElementById('platter');
    const pRect     = platter.getBoundingClientRect();
    const size      = cardRect.width;

    // Start from the center of the vinyl peek (fixed coords — no scrollY needed)
    const sx = peekRect.left + peekRect.width / 2 - size / 2;
    const sy = peekRect.top  + peekRect.height / 2 - size / 2;

    flyingVinyl.style.cssText = `
      display: block;
      width: ${size}px;
      height: ${size}px;
      left: ${sx}px;
      top: ${sy}px;
      background: ${vinylBg(labelColor)};
      transition: none;
      opacity: 1;
    `;
    // Force reflow
    flyingVinyl.getBoundingClientRect();

    const targetSize = pRect.width * 0.88;
    const tx = pRect.left + pRect.width / 2 - targetSize / 2;
    const ty = pRect.top  + pRect.height / 2 - targetSize / 2;

    flyingVinyl.style.transition = `
      left 0.85s cubic-bezier(0.4, 0, 0.2, 1),
      top 0.85s cubic-bezier(0.4, 0, 0.2, 1),
      width 0.85s cubic-bezier(0.4, 0, 0.2, 1),
      height 0.85s cubic-bezier(0.4, 0, 0.2, 1),
      opacity 0.3s
    `;
    flyingVinyl.style.left   = `${tx}px`;
    flyingVinyl.style.top    = `${ty}px`;
    flyingVinyl.style.width  = `${targetSize}px`;
    flyingVinyl.style.height = `${targetSize}px`;

    setTimeout(() => {
      flyingVinyl.style.opacity = '0';
      setTimeout(() => { flyingVinyl.style.display = 'none'; resolve(); }, 200);
    }, 700);
  });
}

// ── Progress bar ─────────────────────────────────────────────────────────────
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressFill.style.width = `${pct}%`;
  const cur = fmt(audio.currentTime);
  const dur = fmt(audio.duration);
  timeDisplay.textContent = `${cur} / ${dur}`;
});
audio.addEventListener('ended', () => {
  trackIdx = (trackIdx + 1) % Math.max(tracks.length, 1);
  if (tracks.length) { playTrack(trackIdx); renderTrackList(); }
});

document.getElementById('progressWrap').addEventListener('click', e => {
  const r = e.currentTarget.getBoundingClientRect();
  if (audio.duration) audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
});

function fmt(s) {
  const m = Math.floor(s / 60);
  return `${m}:${Math.floor(s % 60).toString().padStart(2,'0')}`;
}

// ── Play / Pause ─────────────────────────────────────────────────────────────
document.getElementById('playPauseBtn').addEventListener('click', () => {
  if (!audio.src) return;
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    tonearm.classList.remove('playing');
    tonearm.classList.add('parked');
    vinylOnPlatter.classList.remove('playing');
  } else {
    audio.play();
    isPlaying = true;
    tonearm.classList.remove('parked');
    tonearm.classList.add('playing');
    vinylOnPlatter.classList.add('playing');
  }
  updatePP();
});

// ── Prev / Next ──────────────────────────────────────────────────────────────
document.getElementById('prevBtn').addEventListener('click', () => {
  if (!tracks.length) return;
  trackIdx = (trackIdx - 1 + tracks.length) % tracks.length;
  playTrack(trackIdx); renderTrackList();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (!tracks.length) return;
  trackIdx = (trackIdx + 1) % tracks.length;
  playTrack(trackIdx); renderTrackList();
});

// ── Stop & reset ─────────────────────────────────────────────────────────────
document.getElementById('stopBtn').addEventListener('click', resetPlayer);

function resetPlayer() {
  audio.pause(); audio.src = '';
  isPlaying = false;
  tonearm.classList.remove('playing', 'parked');
  vinylOnPlatter.classList.remove('spinning', 'playing', 'visible');
  tracklistPanel.classList.remove('visible');
  tlEmpty.classList.add('visible');
  tlMeta.textContent = '';
  npLabel.textContent = 'select an album';
  npTitle.textContent = '—';
  progressFill.style.width = '0%';
  timeDisplay.textContent = '';
  tracks = []; trackIdx = 0;
  if (currentIdx !== null) {
    document.querySelector(`.album-card[data-i="${currentIdx}"]`).classList.remove('active');
  }
  currentIdx = null;
  updatePP();
}

// ── Volume ───────────────────────────────────────────────────────────────────
volSlider.addEventListener('input', () => { audio.volume = parseFloat(volSlider.value); });

// ── Update play/pause icon ────────────────────────────────────────────────────
function updatePP() {
  ppIcon.innerHTML = isPlaying
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildGrid();
</script>
</body>
</html>
